<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" href="/icons/favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/icons/icon-192.png">

<meta name="application-name" content="Ledger">
<meta name="apple-mobile-web-app-title" content="Ledger">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="msapplication-TileColor" content="#0f172a">
<meta name="msapplication-config" content="/browserconfig.xml">

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ledger</title>
<meta name="theme-color" content="#0f172a" />

<script src="https://esm.sh/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<link rel="manifest" href="./manifest.webmanifest" />

<style>
body { font-family: system-ui; }
* { transition: all 0.15s ease; }
</style>
</head>

<body class="bg-gradient-to-br from-slate-950 via-slate-900 to-indigo-950 text-slate-100">

<div id="root"></div>

<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.2.0",
    "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
    "htm": "https://esm.sh/htm@3.1.1"
  }
}
</script>

<script type="module">
import React, { useState, useEffect, useRef } from "react";
import { createRoot } from "react-dom/client";
import htm from "htm";
const html = htm.bind(React.createElement);

/* ------------------ SOUND + HAPTICS ------------------ */
const playSound = (type="tap") => {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const o = ctx.createOscillator();
  const g = ctx.createGain();
  o.connect(g); g.connect(ctx.destination);
  o.frequency.value = type==="success"?880:type==="error"?220:440;
  g.gain.value = 0.05;
  o.start(); o.stop(ctx.currentTime+0.08);
};
const vibrate = (p=10)=> navigator.vibrate?.(p);

/* ------------------ VOICE ------------------ */
let recognition=null;
const startVoice = (updateText, textRef) => {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return alert("Voice not supported");

  recognition = new SR();
  recognition.continuous = true;
  recognition.onresult = e=>{
    let t="";
    for(let i=e.resultIndex;i<e.results.length;i++){
      t+=e.results[i][0].transcript;
    }
    updateText(textRef.current+" "+t);
  };
  recognition.start();
};

/* ------------------ UTIL ------------------ */
const todayKey = ()=>"journal:"+new Date().toISOString().slice(0,10);

const download=(name,content,type)=>{
  const blob=new Blob([content],{type});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  a.download=name.replace(/[^\w\-\.]/g,"-");
  a.click();
  URL.revokeObjectURL(url);
};

/* ------------------ APP ------------------ */
function App(){
  const [entry,setEntry]=useState({text:""});
  const [weather,setWeather]=useState("");
  const textRef=useRef("");

  useEffect(()=>{
    playSound(); vibrate(10);

    fetch("https://wttr.in/?format=j1")
    .then(r=>r.json())
    .then(d=>{
      const c=d.current_condition[0];
      setWeather(c.temp_F+"°F "+c.weatherDesc[0].value);
    }).catch(()=>{});
  },[]);

  const updateText=(v)=>{
    textRef.current=v;
    setEntry({text:v});
    localStorage.setItem(todayKey(),JSON.stringify({text:v}));
  };

  const exportJSON=()=>{
    playSound("success"); vibrate(20);
    download("entry.json",JSON.stringify(entry,null,2),"application/json");
  };

  const share=()=>{
    playSound("success");
    if(navigator.share){
      navigator.share({text:entry.text});
    }
  };

  return html`
  <div class="max-w-2xl mx-auto p-6">

    <div class="flex justify-between items-center mb-4">
      <h1 class="text-2xl font-bold">Ledger</h1>
      <div class="text-xs opacity-60">${weather||"..."}</div>
    </div>

    <textarea
      class="w-full min-h-[300px] p-4 rounded-2xl bg-white/5 backdrop-blur border border-white/10 focus:ring-2 focus:ring-indigo-500"
      placeholder="Write..."
      onInput=${e=>updateText(e.target.value)}
    ></textarea>

    <div class="flex gap-2 mt-4 flex-wrap">

      <button onClick=${exportJSON}
        class="px-4 py-2 bg-indigo-600 rounded-2xl flex items-center gap-2 active:scale-95">
        ⬇ Export
      </button>

      <button onClick=${share}
        class="px-4 py-2 bg-slate-700 rounded-2xl active:scale-95">
        Share
      </button>

      <button onClick=${()=>startVoice(updateText,textRef)}
        class="px-4 py-2 bg-indigo-500 rounded-2xl active:scale-95">
        🎤 Speak
      </button>

    </div>

  </div>
  `;
}

createRoot(document.getElementById("root")).render(html`<${App}/>`);
</script>

</body>
</html>
